<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажёр: Движение 6.0 (Идеальные педали)</title>
    <style>
        :root {
            --sky: #e3f2fd;
            --road: #455a64;
            --grass: #81c784;
            --line-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none; 
        }

        .main-container {
            width: 100%;
            max-width: 960px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- ВКЛАДКИ СЦЕНАРИЕВ --- */
        .tabs {
            display: flex;
            background: #eceff1;
            padding: 5px;
            gap: 5px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 600;
            color: #78909c;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .tab-btn:hover { background: #fff; color: #455a64; }
        .tab-btn.active {
            background: white;
            color: #1e88e5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* --- ЗАДАЧА --- */
        .task-area {
            padding: 20px 40px;
            text-align: center;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        .condition-text {
            font-size: 1.15rem;
            color: #37474f;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .highlight { color: #1976d2; font-weight: bold; }

        /* --- ПЕДАЛИ И ПРИБОРЫ --- */
        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px 30px;
            border-bottom: 2px solid #34495e;
        }
        
        .pedal-group {
            display: flex;
            gap: 15px;
        }
        
        .pedal {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 70px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s, filter 0.2s;
            /* КЛЮЧЕВОЕ ИСПРАВЛЕНИЕ: полный запрет браузеру перехватывать жесты на педалях */
            touch-action: none;
        }
        .pedal:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 rgba(0,0,0,0.3);
            filter: brightness(1.2);
        }
        .pedal-gas { background: linear-gradient(to bottom, #43a047, #2e7d32); }
        .pedal-rev { background: linear-gradient(to bottom, #e53935, #c62828); }
        .pedal-icon { font-size: 1.5rem; }

        .dash-item { display: flex; align-items: center; gap: 15px; }
        .dash-text { display: flex; flex-direction: column; align-items: center; }
        .dash-value { 
            font-size: 1.8rem; 
            font-weight: bold; 
            color: #f1c40f; 
            font-variant-numeric: tabular-nums; 
            white-space: nowrap; 
        }
        
        .clock {
            width: 44px; height: 44px;
            border: 3px solid #bdc3c7; border-radius: 50%;
            background: #fff; position: relative;
        }
        .hand {
            position: absolute; bottom: 50%; left: 50%;
            transform-origin: bottom; border-radius: 4px;
        }
        .hour-hand { width: 4px; height: 12px; margin-left: -2px; background: #c0392b; z-index: 3; }
        .minute-hand { width: 2px; height: 18px; margin-left: -1px; background: #2c3e50; z-index: 4; }

        .instruction {
            text-align: center; font-size: 0.95rem; color: #34495e;
            padding: 10px; background: #e8f8f5; font-weight: bold; border-bottom: 1px solid #d1f2eb;
        }

        /* --- СЦЕНА --- */
        .scene {
            position: relative; width: 100%; height: 260px;
            background: linear-gradient(to bottom, var(--sky) 65%, var(--grass) 65%);
            overflow: hidden;
        }

        .road {
            position: absolute; top: 65%; width: 100%; height: 105px;
            background: var(--road);
            border-top: 4px solid #cfd8dc; border-bottom: 4px solid #cfd8dc;
        }
        .road-dashed {
            position: absolute; top: 50%; width: 100%;
            border-top: 4px dashed #cfd8dc; opacity: 0.5;
        }

        .city-marker {
            position: absolute; top: -50px;
            display: flex; flex-direction: column; align-items: center;
            font-weight: bold; color: #2c3e50; z-index: 1;
        }
        .city-pole { width: 2px; height: 50px; background: #333; }
        
        .dimension-line-container {
            position: absolute; top: -65px; height: 40px; z-index: 20; pointer-events: none;
        }
        .dim-line {
            position: absolute; bottom: 0; width: 100%; border-bottom: 2px solid var(--line-color);
        }
        .dim-line::before, .dim-line::after {
            content: ''; position: absolute; bottom: 0; width: 2px; height: 15px; background: var(--line-color);
        }
        .dim-line::before { left: 0; } .dim-line::after { right: 0; }
        .projection-line {
            position: absolute; top: 100%; width: 1px; height: 100px; border-left: 1px dashed rgba(0,0,0,0.3);
        }
        .proj-left { left: 0; } .proj-right { right: 0; }

        .vehicle-wrapper {
            position: absolute; top: 15px; width: 0; height: 0; z-index: 10;
        }
        .vehicle-body {
            position: absolute; top: 0; left: -40px; width: 80px; height: 60px;
            text-align: center; font-size: 50px; line-height: 1; pointer-events: none;
            transition: transform 0.3s;
        }
        .vehicle-tag {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            font-size: 11px; background: rgba(255,255,255,0.9); padding: 2px 6px;
            border-radius: 4px; white-space: nowrap; font-weight: bold;
        }
        .face-right { transform: scaleX(-1); }
        .face-left { transform: scaleX(1); }
        .face-right .vehicle-tag { transform: translateX(-50%) scaleX(-1); } 

        /* --- ОТВЕТЫ --- */
        .controls {
            padding: 20px; background: #f5f5f5;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .answers-grid {
            display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;
        }
        .answer-box {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .ans-label { font-weight: bold; color: #555; }
        input[type="number"] {
            padding: 10px; font-size: 18px; width: 90px;
            border: 2px solid #b0bec5; border-radius: 8px; text-align: center;
        }
        input:focus { border-color: #1e88e5; outline: none; }

        .btn {
            padding: 12px 30px; font-size: 1.1rem; border: none; border-radius: 8px;
            cursor: pointer; color: white; font-weight: bold;
        }
        .btn-check { background-color: #43a047; }
        .btn-next { background-color: #1e88e5; display: none; margin-top: 10px; }

        .feedback-area {
            text-align: center; padding-bottom: 10px; background: #f5f5f5;
            font-weight: bold; font-size: 1.1rem; min-height: 25px;
        }
        .msg-success { color: #2e7d32; }
        .msg-error { color: #c62828; }

    </style>
</head>
<body>

<div class="main-container">
    <div class="tabs">
        <button class="tab-btn active" onclick="Game.setMode(0, this)">1. Навстречу</button>
        <button class="tab-btn" onclick="Game.setMode(1, this)">2. Врозь</button>
        <button class="tab-btn" onclick="Game.setMode(2, this)">3. Вдогонку (вправо)</button>
        <button class="tab-btn" onclick="Game.setMode(3, this)">4. Вдогонку (влево)</button>
    </div>

    <div class="task-area">
        <div class="condition-text" id="conditionText">...</div>
    </div>

    <div class="instruction">💡 Жмите на педаль, чтобы ехать во времени. На каждом ровном часе тренажёр остановится сам!</div>

    <div class="dashboard">
        <div class="pedal-group">
            <button class="pedal pedal-rev" id="btnRev">
                <span class="pedal-icon">⏪</span>
                РЕВЕРС
            </button>
            <button class="pedal pedal-gas" id="btnGas">
                <span class="pedal-icon">⏩</span>
                ГАЗ
            </button>
        </div>

        <div class="dash-item" style="min-width: 170px;">
            <div class="clock">
                <div class="hand hour-hand" id="hourHand"></div>
                <div class="hand minute-hand" id="minuteHand"></div>
            </div>
            <div class="dash-text">
                <span style="font-size: 0.8rem; color: #bdc3c7; text-transform: uppercase;">Время</span>
                <span class="dash-value" id="liveTime" style="display:inline-block; width: 115px; text-align: left;">0 ч 00 мин</span>
            </div>
        </div>
        
        <div class="dash-item" style="background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 12px; min-width: 140px; justify-content: center;">
            <div class="dash-text">
                <span style="font-size: 0.8rem; color: #bdc3c7; text-transform: uppercase;">Дистанция</span>
                <span class="dash-value">
                    <span id="liveDist" style="display:inline-block; width: 75px; text-align: right;">0</span> км
                </span>
            </div>
        </div>
    </div>

    <div class="scene" id="sceneBox">
        <div class="road">
            <div class="road-dashed"></div>
            
            <div class="city-marker" id="cityA">
                <div class="city-flag">📍</div><div class="city-pole"></div><span>A</span>
            </div>
            <div class="city-marker" id="cityB">
                <div class="city-flag">📍</div><div class="city-pole"></div><span>Б</span>
            </div>

            <div id="dimContainer" class="dimension-line-container">
                <div class="dim-line"></div>
                <div class="projection-line proj-left"></div>
                <div class="projection-line proj-right"></div>
            </div>

            <div id="car1" class="vehicle-wrapper">
                <div class="vehicle-body"><div class="vehicle-tag">Авто</div>🚗</div>
            </div>
            <div id="car2" class="vehicle-wrapper">
                <div class="vehicle-body"><div class="vehicle-tag">Грузовик</div>🚛</div>
            </div>
        </div>
    </div>
    
    <div class="feedback-area" id="feedback"></div>

    <div class="controls">
        <div class="answers-grid">
            <div class="answer-box"><span class="ans-label">Случай 1</span><input type="number" class="ans-input" data-idx="0"></div>
            <div class="answer-box"><span class="ans-label">Случай 2</span><input type="number" class="ans-input" data-idx="1"></div>
            <div class="answer-box"><span class="ans-label">Случай 3</span><input type="number" class="ans-input" data-idx="2"></div>
            <div class="answer-box"><span class="ans-label">Случай 4</span><input type="number" class="ans-input" data-idx="3"></div>
        </div>
        <div>
            <button class="btn btn-check" id="btnCheck" onclick="Game.checkAnswers()">ПРОВЕРИТЬ ВСЕ</button>
            <button class="btn btn-next" id="btnNext" onclick="Game.generateRandom()">СГЕНЕРИРОВАТЬ ДРУГУЮ</button>
        </div>
    </div>
</div>

<script>
    const Game = {
        state: {
            v1: 60, v2: 50, distAB: 110,
            targetTime: 1, maxTime: 3.5,
            currentTime: 0, 
            dir1: 1, dir2: -1,
            currentMode: 0, 
            camMinX: 0, camWidth: 100,
            isResolved: false,
            gasActive: 0, 
            animFrame: null,
            lastTimestamp: 0
        },
        ui: {
            car1: document.getElementById('car1'), car1Body: document.querySelector('#car1 .vehicle-body'),
            car2: document.getElementById('car2'), car2Body: document.querySelector('#car2 .vehicle-body'),
            cityA: document.getElementById('cityA'), cityB: document.getElementById('cityB'),
            dimContainer: document.getElementById('dimContainer'),
            condition: document.getElementById('conditionText'),
            liveTime: document.getElementById('liveTime'), liveDist: document.getElementById('liveDist'),
            hourHand: document.getElementById('hourHand'), minuteHand: document.getElementById('minuteHand'),
            inputs: document.querySelectorAll('.ans-input'),
            btnCheck: document.getElementById('btnCheck'), btnNext: document.getElementById('btnNext'),
            feedback: document.getElementById('feedback'),
            btnGas: document.getElementById('btnGas'), btnRev: document.getElementById('btnRev')
        },

        modesConfig: [
            { d1: 1,  d2: -1 }, 
            { d1: -1, d2: 1  }, 
            { d1: 1,  d2: 1  }, 
            { d1: -1, d2: -1 }  
        ],

        init() {
            this.bindPedals();
            this.generateRandom();
        },

        bindPedals() {
            // Используем Pointer Events для идеальной работы на всех устройствах
            const startGas = (dir) => (e) => {
                e.preventDefault();
                // Блокируем захват мыши, чтобы события не улетали мимо
                e.target.setPointerCapture(e.pointerId);

                if (this.state.gasActive === dir) return; 
                this.state.gasActive = dir;
                
                // Очищаем старый кадр, если он завис
                if (this.state.animFrame) {
                    cancelAnimationFrame(this.state.animFrame);
                }

                this.state.lastTimestamp = performance.now(); 
                this.state.animFrame = requestAnimationFrame((ts) => this.animLoop(ts));
            };

            const stopGas = (e) => {
                // Освобождаем захват
                if (e && e.target && e.target.releasePointerCapture) {
                    try { e.target.releasePointerCapture(e.pointerId); } catch(err){}
                }
                
                this.state.gasActive = 0;
                if (this.state.animFrame) {
                    cancelAnimationFrame(this.state.animFrame);
                    this.state.animFrame = null;
                }
            };

            this.ui.btnGas.addEventListener('pointerdown', startGas(1));
            this.ui.btnRev.addEventListener('pointerdown', startGas(-1));

            // Ловим события отпускания везде
            window.addEventListener('pointerup', stopGas);
            window.addEventListener('pointercancel', stopGas);
        },

        animLoop(timestamp) {
            if (this.state.gasActive === 0) {
                this.state.animFrame = null;
                return;
            }

            if (!timestamp) timestamp = performance.now();
            let dt = timestamp - this.state.lastTimestamp;
            this.state.lastTimestamp = timestamp;

            // Защита от лагов
            if (dt > 100) dt = 16;
            if (dt < 0) dt = 0;

            let oldTime = this.state.currentTime;
            let timeDelta = this.state.gasActive * (dt / 2500); 
            let newTimeRaw = oldTime + timeDelta;
            let forceStop = false;

            if (this.state.gasActive === 1) {
                let nextHour = Math.floor(oldTime) + 1;
                if (newTimeRaw >= nextHour && oldTime < nextHour) {
                    newTimeRaw = nextHour; 
                    forceStop = true; 
                }
            } else if (this.state.gasActive === -1) {
                let prevHour = Math.ceil(oldTime) - 1;
                if (newTimeRaw <= prevHour && oldTime > prevHour) {
                    newTimeRaw = prevHour;
                    forceStop = true; 
                }
            }

            newTimeRaw = Math.max(0, Math.min(this.state.maxTime, newTimeRaw));
            
            this.updateSimulation(newTimeRaw);

            if (forceStop || newTimeRaw === 0 || newTimeRaw === this.state.maxTime) {
                this.state.gasActive = 0; 
                this.state.animFrame = null;
                return;
            }

            this.state.animFrame = requestAnimationFrame((ts) => this.animLoop(ts));
        },

        generateRandom() {
            this.state.distAB = (Math.floor(Math.random() * 8) + 5) * 10; 
            this.state.v1 = (Math.floor(Math.random() * 5) + 6) * 10; 
            do {
                this.state.v2 = (Math.floor(Math.random() * 5) + 4) * 10; 
            } while (this.state.v1 === this.state.v2);
            
            this.state.targetTime = Math.floor(Math.random() * 3) + 1; 
            this.state.maxTime = this.state.targetTime + 0.5; 
            
            this.calculateCameraBounds();
            this.resetGlobalUI();
            this.updateText();
            
            document.querySelector('.tab-btn').click(); 
        },

        calculateCameraBounds() {
            let minX = Math.min(0, -this.state.v1 * this.state.maxTime, this.state.distAB - this.state.v2 * this.state.maxTime);
            let maxX = Math.max(this.state.distAB, this.state.v1 * this.state.maxTime, this.state.distAB + this.state.v2 * this.state.maxTime);

            let totalWidthKm = maxX - minX;
            let padding = totalWidthKm * 0.1; 
            
            this.state.camMinX = minX - padding;
            this.state.camWidth = totalWidthKm + padding * 2;
            
            let posA_pct = ((0 - this.state.camMinX) / this.state.camWidth) * 100;
            let posB_pct = ((this.state.distAB - this.state.camMinX) / this.state.camWidth) * 100;
            
            this.ui.cityA.style.left = posA_pct + '%';
            this.ui.cityB.style.left = posB_pct + '%';
        },

        resetGlobalUI() {
            this.state.isResolved = false;
            this.ui.inputs.forEach(inp => { inp.value = ''; inp.disabled = false; inp.style.borderColor = '#b0bec5'; });
            this.ui.btnCheck.style.display = 'block';
            this.ui.btnNext.style.display = 'none';
            this.ui.feedback.textContent = '';
        },

        updateText() {
            const timeStr = this.state.targetTime === 1 ? 'через 1 час' : `через ${this.state.targetTime} ч.`;
            this.ui.condition.innerHTML = 
                `Через пункты А и Б, расстояние между которыми <span class="highlight">${this.state.distAB} км</span>, проходит прямолинейное шоссе.<br> 
                Из пунктов А и Б одновременно выехали автомобиль (<span class="highlight">${this.state.v1} км/ч</span>) 
                и грузовик (<span class="highlight">${this.state.v2} км/ч</span>). <br><br>
                Какое расстояние будет между ними <b>${timeStr}</b> после начала движения в 4-х разных ситуациях?`;
        },

        setMode(modeIdx, btnEl) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');
            
            this.state.currentMode = modeIdx;
            let cfg = this.modesConfig[modeIdx];
            
            this.state.dir1 = cfg.d1;
            this.state.dir2 = cfg.d2;
            
            this.ui.car1Body.className = 'vehicle-body ' + (cfg.d1 === 1 ? 'face-right' : 'face-left');
            this.ui.car2Body.className = 'vehicle-body ' + (cfg.d2 === 1 ? 'face-right' : 'face-left');
            
            this.updateSimulation(0);
        },

        updateSimulation(t_raw) {
            this.state.currentTime = t_raw; 

            let smooth_pos1_km = 0 + (this.state.v1 * t_raw * this.state.dir1);
            let smooth_pos2_km = this.state.distAB + (this.state.v2 * t_raw * this.state.dir2);

            let totalMinutes = Math.round(t_raw * 60);
            let t = totalMinutes / 60;
            
            let pos1_km = 0 + (this.state.v1 * t * this.state.dir1);
            let pos2_km = this.state.distAB + (this.state.v2 * t * this.state.dir2);
            let currentDistance = Math.abs(pos2_km - pos1_km);

            let hours = Math.floor(t);
            let minutes = Math.round((t - hours) * 60);
            if(minutes === 60) { hours++; minutes = 0; }
            this.ui.liveTime.textContent = `${hours} ч ${minutes < 10 ? '0'+minutes : minutes} мин`;
            
            this.ui.liveDist.textContent = currentDistance.toFixed(1).replace('.0', '');

            let exactMinutes = t_raw * 60;
            this.ui.minuteHand.style.transform = `rotate(${exactMinutes * 6}deg)`;
            this.ui.hourHand.style.transform = `rotate(${(t_raw * 30)}deg)`;

            let renderPos1 = ((smooth_pos1_km - this.state.camMinX) / this.state.camWidth) * 100;
            let renderPos2 = ((smooth_pos2_km - this.state.camMinX) / this.state.camWidth) * 100;

            this.ui.car1.style.left = renderPos1 + '%';
            this.ui.car2.style.left = renderPos2 + '%';

            let minP = Math.min(renderPos1, renderPos2);
            let maxP = Math.max(renderPos1, renderPos2);
            this.ui.dimContainer.style.left = minP + '%';
            this.ui.dimContainer.style.width = (maxP - minP) + '%';
            this.ui.dimContainer.style.opacity = (maxP - minP) < 2 ? 0 : 1;
        },

        getCorrectAnswers() {
            let t = this.state.targetTime;
            let v1 = this.state.v1;
            let v2 = this.state.v2;
            let S0 = this.state.distAB;
            
            let ans0 = Math.abs(S0 - (v1 + v2)*t); 
            let ans1 = S0 + (v1 + v2)*t;           
            let ans2 = Math.abs(S0 - Math.abs(v1 - v2)*t); 
            let ans3 = S0 + Math.abs(v1 - v2)*t;           
            
            return [ans0, ans1, ans2, ans3];
        },

        checkAnswers() {
            if (this.state.isResolved) return;

            let correctValues = this.getCorrectAnswers();
            let allFilled = true;
            let allCorrect = true;

            this.ui.inputs.forEach((inp) => {
                let idx = parseInt(inp.getAttribute('data-idx'));
                let val = parseInt(inp.value);
                
                if (isNaN(val)) {
                    allFilled = false;
                    inp.style.borderColor = '#c62828';
                } else if (val !== correctValues[idx]) {
                    allCorrect = false;
                    inp.style.borderColor = '#c62828';
                } else {
                    inp.style.borderColor = '#43a047';
                }
            });

            if (!allFilled) {
                this.ui.feedback.innerHTML = `<span class="msg-error">Сначала заполни все 4 поля!</span>`;
                return;
            }

            if (allCorrect) {
                this.ui.feedback.innerHTML = `<span class="msg-success">Блестяще! Все 4 ситуации рассчитаны верно!</span>`;
                this.ui.inputs.forEach(inp => inp.disabled = true);
                this.ui.btnCheck.style.display = 'none';
                this.ui.btnNext.style.display = 'block';
                this.state.isResolved = true;
            } else {
                this.ui.feedback.innerHTML = `<span class="msg-error">Где-то ошибка. Перепроверь выделенные красным ответы, прокатившись по вкладкам.</span>`;
            }
        }
    };

    Game.init();
</script>
</body>
</html>
