<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажёр: Движение 6.0 (Интерактив + Часы)</title>
    <style>
        :root {
            --sky: #e3f2fd;
            --road: #455a64;
            --grass: #81c784;
            --line-color: #2c3e50;
            --accent: #d35400;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            /* Запрет выделения текста для удобного перетаскивания */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none; 
        }

        .main-container {
            width: 100%;
            max-width: 960px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- ВКЛАДКИ --- */
        .tabs {
            display: flex;
            background: #eceff1;
            padding: 5px;
            gap: 5px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 600;
            color: #78909c;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .tab-btn:hover { background: #fff; color: #455a64; }
        .tab-btn.active {
            background: white;
            color: #1e88e5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* --- ТЕКСТ ЗАДАЧИ --- */
        .task-area {
            padding: 20px 40px;
            text-align: center;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        .condition-text {
            font-size: 1.15rem;
            color: #37474f;
            line-height: 1.4;
            margin-bottom: 15px;
        }
        .question-text {
            font-size: 1.25rem;
            color: #d32f2f;
            font-weight: 700;
            background: #ffebee;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
        }
        .highlight {
            color: #1976d2;
            font-weight: bold;
        }

        /* --- ПАНЕЛЬ ПРИБОРОВ --- */
        .dashboard {
            display: flex;
            justify-content: space-around;
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            font-size: 1.2rem;
            border-bottom: 2px solid #34495e;
        }
        .dash-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .dash-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .dash-text-right {
            align-items: flex-end;
        }
        .dash-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #bdc3c7;
        }
        .dash-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #f1c40f;
            font-variant-numeric: tabular-nums;
        }

        /* --- АНАЛОГОВЫЕ ЧАСЫ --- */
        .clock {
            width: 50px;
            height: 50px;
            border: 4px solid #bdc3c7;
            border-radius: 50%;
            background: #fff;
            position: relative;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }
        .clock-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: #2c3e50;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 4px;
            transition: transform 0.05s linear;
        }
        .hour-hand {
            width: 4px;
            height: 14px;
            margin-left: -2px;
            background: #c0392b;
            z-index: 3;
        }
        .minute-hand {
            width: 2px;
            height: 20px;
            margin-left: -1px;
            background: #2c3e50;
            z-index: 4;
        }
        /* Деления на часах (12, 3, 6, 9) */
        .clock-mark {
            position: absolute;
            background: #95a5a6;
        }
        .mark-12 { top: 2px; left: 50%; width: 2px; height: 4px; transform: translateX(-50%); }
        .mark-3 { top: 50%; right: 2px; width: 4px; height: 2px; transform: translateY(-50%); }
        .mark-6 { bottom: 2px; left: 50%; width: 2px; height: 4px; transform: translateX(-50%); }
        .mark-9 { top: 50%; left: 2px; width: 4px; height: 2px; transform: translateY(-50%); }

        .instruction {
            text-align: center;
            font-size: 0.95rem;
            color: #34495e;
            padding: 10px;
            background: #e8f8f5;
            font-weight: bold;
            border-bottom: 1px solid #d1f2eb;
        }

        /* --- СЦЕНА --- */
        .scene {
            position: relative;
            width: 100%;
            height: 280px;
            background: linear-gradient(to bottom, var(--sky) 65%, var(--grass) 65%);
            overflow: hidden;
            cursor: grab;
        }
        .scene:active { cursor: grabbing; }

        .road {
            position: absolute;
            top: 65%;
            width: 100%;
            height: 105px;
            background: var(--road);
            border-top: 4px solid #cfd8dc;
            border-bottom: 4px solid #cfd8dc;
        }
        .road-dashed {
            position: absolute;
            top: 50%;
            width: 100%;
            border-top: 4px dashed #cfd8dc;
            opacity: 0.5;
        }

        .city-marker {
            position: absolute;
            top: -50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.7;
            font-weight: bold;
            color: #2c3e50;
            z-index: 1;
        }
        .city-pole { width: 2px; height: 50px; background: #333; }
        .city-flag { font-size: 24px; line-height: 1; }

        .dimension-line-container {
            position: absolute;
            top: -65px;
            height: 40px;
            z-index: 20;
            pointer-events: none;
        }
        .dim-line {
            position: absolute;
            bottom: 0;
            width: 100%;
            border-bottom: 2px solid var(--line-color);
        }
        .dim-line::before, .dim-line::after {
            content: ''; position: absolute; bottom: 0; width: 2px; height: 15px; background: var(--line-color);
        }
        .dim-line::before { left: 0; }
        .dim-line::after { right: 0; }
        
        .projection-line {
            position: absolute;
            top: 100%;
            width: 1px;
            height: 100px;
            border-left: 1px dashed rgba(0,0,0,0.3);
        }
        .proj-left { left: 0; }
        .proj-right { right: 0; }

        .vehicle-wrapper {
            position: absolute;
            top: 15px;
            width: 0;
            height: 0;
            z-index: 10;
            will-change: transform;
            padding: 20px;
            margin: -20px;
        }
        .vehicle-body {
            position: absolute;
            top: 0;
            left: -40px;
            width: 80px;
            height: 60px;
            text-align: center;
            font-size: 50px;
            line-height: 1;
            pointer-events: none;
        }
        .vehicle-tag {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            background: rgba(255,255,255,0.9);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            font-weight: bold;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .face-right { transform: scaleX(-1); }
        .face-left { transform: scaleX(1); }
        .face-right .vehicle-tag { transform: translateX(-50%) scaleX(-1); } 

        /* --- БЛОК ОТВЕТА И ПРОВЕРКИ --- */
        .controls {
            padding: 20px;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        
        input[type="number"] {
            padding: 12px;
            font-size: 18px;
            width: 120px;
            border: 2px solid #b0bec5;
            border-radius: 8px;
            text-align: center;
            transition: border 0.3s;
        }
        input:focus { border-color: #1e88e5; outline: none; }

        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            transition: transform 0.1s, background 0.2s;
        }
        .btn:hover { filter: brightness(1.1); }
        .btn:active { transform: scale(0.98); }

        .btn-check { background-color: #43a047; }
        .btn-next { background-color: #1e88e5; display: none; }

        .feedback-area {
            min-height: 30px;
            text-align: center;
            padding-bottom: 10px;
            background: #f5f5f5;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .msg-success { color: #2e7d32; }
        .msg-error { color: #c62828; }

    </style>
</head>
<body>

<div class="main-container">
    <div class="tabs">
        <button class="tab-btn active" onclick="Game.setMode('meet', this)">Навстречу</button>
        <button class="tab-btn" onclick="Game.setMode('apart', this)">В разные стороны</button>
        <button class="tab-btn" onclick="Game.setMode('chase', this)">Вдогонку</button>
    </div>

    <div class="task-area">
        <div class="condition-text" id="conditionText">...</div>
        <div class="question-text" id="questionText">...</div>
    </div>

    <div class="instruction">💡 Потяните машинку мышкой, чтобы настроить часы и найти ответ!</div>

    <div class="dashboard">
        <div class="dash-item">
            <div class="clock">
                <div class="clock-mark mark-12"></div>
                <div class="clock-mark mark-3"></div>
                <div class="clock-mark mark-6"></div>
                <div class="clock-mark mark-9"></div>
                <div class="hand hour-hand" id="hourHand"></div>
                <div class="hand minute-hand" id="minuteHand"></div>
                <div class="clock-center"></div>
            </div>
            <div class="dash-text">
                <span class="dash-label">Время в пути</span>
                <span class="dash-value" id="liveTime">0 ч 00 мин</span>
            </div>
        </div>
        <div class="dash-item">
            <div class="dash-text dash-text-right">
                <span class="dash-label">Текущая дистанция</span>
                <span class="dash-value"><span id="liveDist">0</span> км</span>
            </div>
        </div>
    </div>

    <div class="scene" id="sceneBox">
        <div class="road">
            <div class="road-dashed"></div>
            
            <div class="city-marker" id="cityA" style="left: 5%">
                <div class="city-flag">🚩</div>
                <div class="city-pole"></div><span>A</span>
            </div>
            <div class="city-marker" id="cityB" style="left: 95%">
                <div class="city-flag">🏁</div>
                <div class="city-pole"></div><span>B</span>
            </div>

            <div id="dimContainer" class="dimension-line-container">
                <div class="dim-line"></div>
                <div class="projection-line proj-left"></div>
                <div class="projection-line proj-right"></div>
            </div>

            <div id="car1" class="vehicle-wrapper">
                <div class="vehicle-body">
                    <div class="vehicle-tag">Авто</div>🚗
                </div>
            </div>

            <div id="car2" class="vehicle-wrapper">
                <div class="vehicle-body">
                    <div class="vehicle-tag">Грузовик</div>🚛
                </div>
            </div>
        </div>
    </div>
    
    <div class="feedback-area" id="feedback"></div>

    <div class="controls">
        <label style="font-size: 1.1rem; color: #555; font-weight: bold;">Ответ:</label>
        <input type="number" id="inpAnswer" placeholder="...">
        <span style="font-weight: bold; color: #555;">км</span>
        <button class="btn btn-check" id="btnCheck" onclick="Game.check()">ПРОВЕРИТЬ</button>
        <button class="btn btn-next" id="btnNext" onclick="Game.generate()">СЛЕДУЮЩАЯ >></button>
    </div>
</div>

<script>
    const Game = {
        state: {
            mode: 'meet',
            currentTime: 0,
            maxTime: 5,
            targetTime: 0,
            targetAnswer: 0,
            v1: 0,
            v2: 0,
            sStart: 0,
            dir1: 1, 
            dir2: -1,
            startX1: 0, 
            startX2: 0,
            isResolved: false
        },
        ui: {
            scene: document.getElementById('sceneBox'),
            car1: document.getElementById('car1'),
            car1Body: document.querySelector('#car1 .vehicle-body'),
            car2: document.getElementById('car2'),
            car2Body: document.querySelector('#car2 .vehicle-body'),
            dimContainer: document.getElementById('dimContainer'),
            condition: document.getElementById('conditionText'),
            question: document.getElementById('questionText'),
            liveTime: document.getElementById('liveTime'),
            liveDist: document.getElementById('liveDist'),
            hourHand: document.getElementById('hourHand'),
            minuteHand: document.getElementById('minuteHand'),
            cityA: document.getElementById('cityA'),
            cityB: document.getElementById('cityB'),
            inp: document.getElementById('inpAnswer'),
            btnCheck: document.getElementById('btnCheck'),
            btnNext: document.getElementById('btnNext'),
            feedback: document.getElementById('feedback')
        },

        init() {
            this.bindDragEvents();
            this.generate();
        },

        setMode(mode, btn) {
            this.state.mode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.generate();
        },

        generate() {
            this.state.isResolved = false;
            this.ui.inp.value = '';
            this.ui.inp.disabled = false;
            this.ui.btnCheck.style.display = 'block';
            this.ui.btnNext.style.display = 'none';
            this.ui.feedback.textContent = '';

            this.state.v1 = (Math.floor(Math.random() * 4) + 6) * 10; 
            this.state.v2 = (Math.floor(Math.random() * 4) + 4) * 10; 
            
            this.state.maxTime = Math.floor(Math.random() * 3) + 3; 
            this.state.targetTime = Math.floor(Math.random() * (this.state.maxTime - 1)) + 1;
            this.state.currentTime = 0;

            let condTxt = '';
            let questTxt = `Какое расстояние будет между ними через ${this.state.targetTime} ч?`;

            this.ui.cityA.style.opacity = 0;
            this.ui.cityB.style.opacity = 0;

            if (this.state.mode === 'meet') {
                this.state.sStart = (this.state.v1 + this.state.v2) * this.state.maxTime;
                this.state.targetAnswer = this.state.sStart - (this.state.v1 + this.state.v2) * this.state.targetTime;
                
                this.ui.cityA.style.opacity = 1;
                this.ui.cityB.style.opacity = 1;
                this.ui.cityA.style.left = '5%';
                this.ui.cityB.style.left = '95%';

                condTxt = `Расстояние между пунктами А и Б равно <span class="highlight">${this.state.sStart} км</span>.<br>
                           Навстречу друг другу едут автомобиль (${this.state.v1} км/ч) и грузовик (${this.state.v2} км/ч).`;

                this.state.startX1 = 5; 
                this.state.startX2 = 95;
                this.state.dir1 = 1; this.state.dir2 = -1;

            } else if (this.state.mode === 'apart') {
                this.state.sStart = 0;
                this.state.targetAnswer = (this.state.v1 + this.state.v2) * this.state.targetTime;

                this.ui.cityA.style.opacity = 1;
                this.ui.cityA.querySelector('span').textContent = 'Старт';
                this.ui.cityA.style.left = '50%';
                
                condTxt = `Из одного пункта в противоположных направлениях выехали <br>
                           автомобиль (${this.state.v1} км/ч) и грузовик (${this.state.v2} км/ч).`;

                this.state.startX1 = 50; 
                this.state.startX2 = 50;
                this.state.dir1 = -1; this.state.dir2 = 1;

            } else if (this.state.mode === 'chase') {
                let vFast = Math.max(this.state.v1, this.state.v2);
                let vSlow = Math.min(this.state.v1, this.state.v2);
                this.state.v1 = vFast;
                this.state.v2 = vSlow;

                this.state.sStart = (this.state.v1 - this.state.v2) * this.state.maxTime;
                this.state.targetAnswer = this.state.sStart - (this.state.v1 - this.state.v2) * this.state.targetTime;

                condTxt = `Грузовик едет со скоростью ${this.state.v2} км/ч.<br>
                           Позади него на расстоянии <span class="highlight">${this.state.sStart} км</span> едет автомобиль (${this.state.v1} км/ч).`;

                this.state.startX1 = 5; 
                this.state.startX2 = 5 + (this.state.sStart / (this.state.v1 * this.state.maxTime + this.state.sStart) * 85);
                this.state.dir1 = 1; this.state.dir2 = 1;
            }

            this.ui.condition.innerHTML = condTxt;
            this.ui.question.innerHTML = questTxt;
            
            this.setOrientation(this.ui.car1Body, this.state.dir1);
            this.setOrientation(this.ui.car2Body, this.state.dir2);
            
            this.updateSimulation(0);
        },

        check() {
            if (this.state.isResolved) return;

            const val = parseFloat(this.ui.inp.value);
            if (isNaN(val)) return;

            if (Math.abs(val - this.state.targetAnswer) <= 1) {
                this.ui.feedback.innerHTML = `<span class="msg-success">Верно! Дистанция составит ${this.state.targetAnswer} км.</span>`;
                this.ui.inp.disabled = true;
                this.ui.btnCheck.style.display = 'none';
                this.ui.btnNext.style.display = 'block';
                this.state.isResolved = true;
            } else {
                this.ui.feedback.innerHTML = `<span class="msg-error">Пока неверно. Выставь на часах ровно ${this.state.targetTime} ч. 00 мин.</span>`;
            }
        },

        bindDragEvents() {
            let isDragging = false;
            let startMouseX = 0;
            let startTimeAtDrag = 0;

            const onStart = (e) => {
                isDragging = true;
                startMouseX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                startTimeAtDrag = this.state.currentTime;
            };

            const onMove = (e) => {
                if (!isDragging) return;
                let currentMouseX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                let dx = currentMouseX - startMouseX;

                let timeDelta = (dx / window.innerWidth) * this.state.maxTime * 1.5; 
                let newTimeRaw = startTimeAtDrag + timeDelta;
                newTimeRaw = Math.max(0, Math.min(this.state.maxTime, newTimeRaw));
                
                this.updateSimulation(newTimeRaw);
            };

            const onEnd = () => { isDragging = false; };

            this.ui.scene.addEventListener('mousedown', onStart);
            this.ui.scene.addEventListener('touchstart', onStart, {passive: true});
            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', onMove, {passive: true});
            window.addEventListener('mouseup', onEnd);
            window.addEventListener('touchend', onEnd);
        },

        updateSimulation(t_raw) {
            // Переводим "сырое" время в целые минуты для точности
            let totalMinutes = Math.round(t_raw * 60);
            
            // Прилипание (snapping) к целым часам, чтобы было легко поймать 00 минут
            if (totalMinutes % 60 <= 4) totalMinutes -= (totalMinutes % 60);
            else if (totalMinutes % 60 >= 56) totalMinutes += (60 - (totalMinutes % 60));

            let t = totalMinutes / 60;
            this.state.currentTime = t;
            const d = this.state;
            
            // Расчеты дистанции
            let dist1 = d.v1 * t;
            let dist2 = d.v2 * t;
            let currentDistance = 0;

            if (d.mode === 'meet') {
                currentDistance = Math.max(0, d.sStart - dist1 - dist2);
            } else if (d.mode === 'apart') {
                currentDistance = dist1 + dist2;
            } else if (d.mode === 'chase') {
                currentDistance = Math.max(0, d.sStart - (dist1 - dist2));
            }

            // Обновление текста на табло
            let hours = Math.floor(t);
            let minutes = Math.round((t - hours) * 60);
            if(minutes === 60) { hours++; minutes = 0; }
            
            let minStr = minutes < 10 ? '0' + minutes : minutes;
            this.ui.liveTime.textContent = `${hours} ч ${minStr} мин`;
            
            // Округляем до 1 знака после запятой, чтобы не пугать огромными дробями,
            // но на ровных часах будет идеально целое число, как и договаривались.
            this.ui.liveDist.textContent = currentDistance.toFixed(1).replace('.0', '');

            // Обновление стрелок аналоговых часов
            let minAngle = minutes * 6; // 360 градусов / 60 минут
            let hourAngle = (hours * 30) + (minutes * 0.5); // 360/12 + смещение от минут

            this.ui.minuteHand.style.transform = `rotate(${minAngle}deg)`;
            this.ui.hourHand.style.transform = `rotate(${hourAngle}deg)`;

            // Отрисовка машин
            let maxTotalDist = 0;
            if (d.mode === 'meet') maxTotalDist = d.sStart;
            if (d.mode === 'apart') maxTotalDist = (d.v1 + d.v2) * d.maxTime;
            if (d.mode === 'chase') maxTotalDist = d.v1 * d.maxTime + d.sStart;

            let pxPerKm = 85 / maxTotalDist; 

            let pos1 = d.startX1 + (dist1 * pxPerKm * d.dir1);
            let pos2 = d.startX2 + (dist2 * pxPerKm * d.dir2);

            this.ui.car1.style.left = pos1 + '%';
            this.ui.car2.style.left = pos2 + '%';

            let minP = Math.min(pos1, pos2);
            let maxP = Math.max(pos1, pos2);
            this.ui.dimContainer.style.left = minP + '%';
            this.ui.dimContainer.style.width = (maxP - minP) + '%';
            this.ui.dimContainer.style.opacity = (maxP - minP) < 2 ? 0 : 1;
        },

        setOrientation(el, dir) {
            el.className = 'vehicle-body ' + (dir === 1 ? 'face-right' : 'face-left');
        }
    };

    Game.init();
</script>
</body>
</html>
